<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Confirmación de Asistencia - Enol & Lucía</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Open+Sans:wght@300;400&display=swap" rel="stylesheet">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Open Sans', sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  height: auto; 
}

.background {
  position: fixed;
  top: 0; left: 0;
  width: 100vw; height: 100vh;
  background: url('https://images.unsplash.com/photo-1522673607200-164d1b6ce486') no-repeat center center;
  background-size: cover;
  z-index: -2;
}

.overlay {
  position: fixed;
  top: 0; left: 0;
  width: 100vw; height: 100vh;
  background: rgba(0,0,0,0.45);
  z-index: -1;
}

.container {
  position: relative;
  width: 90%;
  max-width: 500px;
  margin: 40px auto; 
  z-index: 1;
}

/* TARJETA SIEMPRE VISIBLE */
.card {
  background: rgba(255,255,255,0.95);
  padding: 40px;
  border-radius: 16px;
  text-align: center;
  box-shadow: 0 20px 50px rgba(0,0,0,0.4);
  /* Eliminadas las opacidades para que se vea siempre */
}

.final-message {
  display: none;
  background: rgba(255,255,255,0.95);
  padding: 40px;
  border-radius: 16px;
  text-align: center;
}

h1 { font-family: 'Playfair Display', serif; color: #1F2A44; font-size: 2.2em; }
.date { color: #D4AF37; margin: 10px 0 20px; font-weight: 600; letter-spacing: 1px; }
p { margin-bottom: 10px; color: #333; }
h2 { margin: 20px 0; color: #D4AF37; font-family: 'Playfair Display', serif; font-size: 1.5em; }

input, select {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border: none;
  border-bottom: 1px solid #ccc;
  background: transparent;
  font-family: inherit;
  font-size: 16px; 
}

input:focus, select:focus { outline: none; border-bottom: 2px solid #D4AF37; }

/* CONTENEDOR DE CAMPOS EXTRA (TRANSICIÓN SUAVE) */
#extraFields {
  max-height: 0;
  opacity: 0;
  overflow: hidden;
  transition: all 0.6s ease; /* Aquí ocurre la magia */
  background: rgba(212, 175, 55, 0.05);
  border-radius: 8px;
}
</style>
</head>

<body>

<div class="background"></div>
<div class="overlay"></div>

<div class="container">
  <div class="card" id="card">
    <h1>Enol & Lucía</h1>
    <div class="date">5 DE SEPTIEMBRE DE 2026</div>
    <p>Nos complace invitarte a celebrar nuestro enlace.</p>
    <p>Será un honor contar contigo en este día tan especial.</p>

    <h2>Confirmación de asistencia</h2>

    <form id="weddingForm">
      <input type="text" name="nombre" placeholder="Nombre completo" required>

      <select name="asistencia" id="asistenciaSelect" required>
        <option value="" disabled selected>¿Asistirás?</option>
        <option value="Sí">Sí, asistiré</option>
        <option value="No">No podré asistir</option>
      </select>

      <div id="extraFields">
        <div style="padding: 10px 15px;"> <input type="number" name="acompanantes" placeholder="Número de acompañantes" min="0">
          <input type="text" name="alergias" placeholder="Alergias o restricciones">
        </div>
      </div>

      <button type="submit" id="submitBtn" style="margin-top:25px; padding:14px 40px; background:#1F2A44; color:white; border:none; border-radius:30px; cursor:pointer; font-weight:600; text-transform:uppercase;">
        Enviar confirmación
      </button>
    </form>
  </div>

  <div class="final-message" id="thanksMessage">
    <h1>¡Gracias, <span id="userNameDisplay"></span>! 💍</h1>
    <p>Tu respuesta ha sido enviada correctamente.</p>
  </div>
</div>

<script>
const scriptURL = 'https://script.google.com/macros/s/AKfycbxUaGCjMAT7BlASarfIJsXGG4XnBrs74AKzMF79bW4nCPwobpkVttwMaJ20VAV9F5TW/exec'; 
const form = document.getElementById('weddingForm');
const asistenciaSelect = document.getElementById('asistenciaSelect');
const extraFields = document.getElementById('extraFields');

// LÓGICA DE TRANSICIÓN SUAVE
asistenciaSelect.addEventListener('change', function() {
    if (this.value === 'Sí') {
        extraFields.style.maxHeight = '300px'; // Altura suficiente
        extraFields.style.opacity = '1';
        extraFields.style.marginTop = '10px';
    } else {
        extraFields.style.maxHeight = '0';
        extraFields.style.opacity = '0';
        extraFields.style.marginTop = '0';
    }
});

form.addEventListener('submit', e => {
  e.preventDefault();
  const nombreCompleto = form.nombre.value.trim();
  document.getElementById('userNameDisplay').innerText = nombreCompleto.split(' ')[0];
  
  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.innerText = "Enviando...";

  fetch(scriptURL, { method: 'POST', body: new FormData(form), mode: 'no-cors' })
  .then(() => {
    if(typeof confetti === 'function') lanzarConfeti();
    document.getElementById('card').style.display = 'none';
    document.getElementById('thanksMessage').style.display = 'block';
  })
  .catch(error => {
    alert("Error al enviar. Inténtalo de nuevo.");
    btn.disabled = false;
    btn.innerText = "Enviar confirmación";
  });
});

function lanzarConfeti() {
  const duration = 3000;
  const end = Date.now() + duration;
  (function frame() {
    confetti({ particleCount: 3, angle: 60, spread: 55, origin: { x: 0, y: 0.6 }, colors: ['#D4AF37', '#1F2A44'] });
    confetti({ particleCount: 3, angle: 120, spread: 55, origin: { x: 1, y: 0.6 }, colors: ['#D4AF37', '#1F2A44'] });
    if (Date.now() < end) requestAnimationFrame(frame);
  }());
}

(function() {
  const s = document.createElement('script');
  s.src = 'https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js';
  document.body.appendChild(s);
})();
</script>

</body>
</html>
