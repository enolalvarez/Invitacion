<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Confirmación de Asistencia - Enol & Lucía</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Open+Sans:wght@300;400&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Open Sans', sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  /* IMPORTANTE: Permitir que el cuerpo crezca si el contenido lo necesita */
  height: auto; 
}

/* FONDO CORREGIDO */
.background {
  position: fixed; /* Mantiene el fondo quieto al hacer scroll */
  top: 0;
  left: 0;
  width: 100vw; /* Ancho completo de la ventana */
  height: 100vh; /* Alto completo de la ventana */
  background: url('https://images.unsplash.com/photo-1522673607200-164d1b6ce486') no-repeat center center;
  background-size: cover; /* Clave: La imagen siempre cubre todo el espacio disponible */
  z-index: -2; /* Se asegura de estar detrás de todo */
}

/* OVERLAY */
.overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  background: rgba(0,0,0,0.45);
  z-index: -1;
}

/* CONTENEDOR */
.container {
  position: relative;
  width: 90%;
  max-width: 500px;
  /* Añadir margen vertical para que no se pegue a los bordes al crecer */
  margin: 40px auto; 
  z-index: 1;
}

/* TARJETA */
.card {
  background: rgba(255,255,255,0.95);
  padding: 40px;
  border-radius: 16px;
  text-align: center;
  box-shadow: 0 20px 50px rgba(0,0,0,0.4);
  opacity: 0;
  transform: translateY(30px);
  transition: all 1s ease;
}

.card.show {
  opacity: 1;
  transform: translateY(0);
}

/* MENSAJE FINAL */
.final-message {
  display: none;
  background: rgba(255,255,255,0.95);
  padding: 40px;
  border-radius: 16px;
  text-align: center;
  box-shadow: 0 20px 50px rgba(0,0,0,0.3);
}

/* TIPOGRAFÍA */
h1 {
  font-family: 'Playfair Display', serif;
  color: #1F2A44;
  font-size: 2.2em;
}

.date {
  color: #D4AF37;
  margin: 10px 0 20px;
  font-weight: 600;
  letter-spacing: 1px;
}

p {
  margin-bottom: 10px;
  color: #333;
}

h2 {
  margin: 20px 0;
  color: #D4AF37;
  font-family: 'Playfair Display', serif;
  font-size: 1.5em;
}

/* FORMULARIO */
input, select {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border: none;
  border-bottom: 1px solid #ccc;
  background: transparent;
  font-family: inherit;
  font-size: 16px; 
}

input:focus, select:focus {
  outline: none;
  border-bottom: 2px solid #D4AF37;
}

/* SECCIÓN CONDICIONAL (OCULTA POR DEFECTO) */
#extraFields {
  display: none;
  overflow: hidden;
  transition: all 0.5s ease;
  background: rgba(212, 175, 55, 0.05);
  padding: 0 15px;
  border-radius: 8px;
  margin-top: 10px;
}

button {
  margin-top: 25px;
  padding: 14px 40px;
  background: #1F2A44;
  color: white;
  border: none;
  border-radius: 30px;
  cursor: pointer;
  transition: 0.3s;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
}

button:hover {
  background: #D4AF37;
  color: #1F2A44;
  transform: scale(1.05);
}

button:disabled {
  background: #ccc;
  cursor: not-allowed;
}

</style>
</head>

<body>

<div class="background"></div>
<div class="overlay"></div>

<div class="container">

  <div class="card" id="card">
    <h1>Enol & Lucía</h1>
    <div class="date">5 DE SEPTIEMBRE DE 2026</div>

    <p>Nos complace invitarte a celebrar nuestro enlace.</p>
    <p>Será un honor contar contigo en este día tan especial.</p>

    <h2>Confirmación</h2>

    <form id="weddingForm">
      <input type="text" name="nombre" placeholder="Nombre completo" required>

      <select name="asistencia" id="asistenciaSelect" required>
        <option value="" disabled selected>¿Asistirás?</option>
        <option value="Sí">Sí, asistiré</option>
        <option value="No">No podré asistir</option>
      </select>

      <div id="extraFields">
        <input type="number" name="acompanantes" placeholder="Número de acompañantes" min="0" max="10">
        <input type="text" name="alergias" placeholder="Alergias o restricciones alimentarias">
      </div>

      <button type="submit" id="submitBtn">Enviar confirmación</button>
    </form>
  </div>

 <div class="final-message" id="thanksMessage">
    <h1>¡Gracias, <span id="userNameDisplay"></span>! 💍</h1>
    <p>Tu respuesta ha sido enviada correctamente.</p>
    <p>Nos hace mucha ilusión compartir este día contigo.</p>
</div>

</div>

<script>
// --- CONFIGURACIÓN ---
const scriptURL = 'https://script.google.com/macros/s/AKfycbxUaGCjMAT7BlASarfIJsXGG4XnBrs74AKzMF79bW4nCPwobpkVttwMaJ20VAV9F5TW/exec; 

const form = document.getElementById('weddingForm');
const card = document.getElementById('card');
const thanks = document.getElementById('thanksMessage');
const btn = document.getElementById('submitBtn');
const asistenciaSelect = document.getElementById('asistenciaSelect');
const extraFields = document.getElementById('extraFields');

// Lógica para mostrar/ocultar campos extras
asistenciaSelect.addEventListener('change', function() {
    if (this.value === 'Sí') {
        extraFields.style.display = 'block';
    } else {
        extraFields.style.display = 'none';
        // Opcional: limpiar los campos si elige "No" después de haber puesto algo
        extraFields.querySelectorAll('input').forEach(input => input.value = '');
    }
});

// Animación inicial de entrada
window.addEventListener("load", () => {
  setTimeout(() => {
    card.classList.add("show");
  }, 500);
});

// ENVÍO DEL FORMULARIO
form.addEventListener('submit', e => {
  e.preventDefault(); 
  
  // --- NUEVA LÓGICA PARA EL NOMBRE ---
  const nombreCompleto = form.nombre.value.trim();
  const primerNombre = nombreCompleto.split(' ')[0]; // Coge solo la primera palabra
  document.getElementById('userNameDisplay').innerText = primerNombre;
  // ------------------------------------

  btn.disabled = true;
  btn.innerText = "Enviando...";

  fetch(scriptURL, { 
    method: 'POST', 
    body: new FormData(form),
    mode: 'no-cors' 
  })
  .then(() => {
    lanzarConfeti();
    card.style.display = 'none';
    thanks.style.display = 'block';
  })
  .catch(error => {
    console.error('Error!', error.message);
    alert("Hubo un error al enviar. Por favor, inténtalo de nuevo.");
    btn.disabled = false;
    btn.innerText = "Enviar confirmación";
  });
});

// FUNCIÓN DE CONFETI
function lanzarConfeti() {
  const duration = 4 * 1000;
  const end = Date.now() + duration;

  (function frame() {
    confetti({
      particleCount: 4,
      angle: 60,
      spread: 55,
      origin: { x: 0, y: 0.6 },
      colors: ['#D4AF37', '#F7E7CE', '#1F2A44']
    });
    confetti({
      particleCount: 4,
      angle: 120,
      spread: 55,
      origin: { x: 1, y: 0.6 },
      colors: ['#D4AF37', '#F7E7CE', '#1F2A44']
    });

    if (Date.now() < end) {
      requestAnimationFrame(frame);
    }
  }());
}

// Carga de librería de confeti
(function() {
  const s = document.createElement('script');
  s.src = 'https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js';
  document.body.appendChild(s);
})();
</script>

</body>
</html>
